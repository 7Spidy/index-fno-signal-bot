<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⬡ F&amp;O Signal Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #090c14; --surface: #0f1422; --surface2: #141929;
  --border: #1e2840; --border2: #263050;
  --green: #00e5a0; --green-dim: #00e5a015;
  --red: #f87171;   --red-dim: #f8717115;
  --amber: #f59e0b;
  --text: #dde4f0;  --text-muted: #6b7fa3; --text-dim: #9aacc8;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.app-name { font-family: var(--display); font-weight: 700; font-size: 15px; color: var(--green); }
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
.header-right { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-muted); }
.time-ago { color: var(--text-dim); }
.token-pill {
  padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: .05em;
}
.pill-valid { background: #00e5a015; color: var(--green); border: 1px solid #00e5a030; }
.pill-expired { background: #f8717115; color: var(--red); border: 1px solid #f8717130; }

/* OFFLINE BANNER */
.offline-banner {
  display: none;
  background: #f59e0b15;
  border-bottom: 1px solid #f59e0b28;
  color: var(--amber);
  text-align: center;
  padding: 8px 16px;
  font-size: 12px;
}

/* MAIN CONTENT */
.content { padding: 16px; max-width: 680px; margin: 0 auto; }

/* ── SIGNAL BANNER (new rich layout) ───────────────────────── */
#signal-area { margin-bottom: 16px; }

.signal-banner {
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.signal-banner-ce {
  border: 2px solid var(--green);
  animation: pulse-green 2s ease-in-out infinite;
}
.signal-banner-pe {
  border: 2px solid var(--red);
  animation: pulse-red 2s ease-in-out infinite;
}
@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,160,0.45); }
  50%       { box-shadow: 0 0 0 16px rgba(0,229,160,0); }
}
@keyframes pulse-red {
  0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.45); }
  50%       { box-shadow: 0 0 0 16px rgba(248,113,113,0); }
}

/* Banner header row */
.sig-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 8px;
  background: var(--surface);
}
.sig-title { font-family: var(--display); font-weight: 800; font-size: 15px; }
.signal-banner-ce .sig-title { color: var(--green); }
.signal-banner-pe .sig-title { color: var(--red); }
.sig-candle-time { font-size: 11px; color: var(--text-muted); }

/* Buy this option box */
.sig-option-box {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border2);
}
.signal-banner-ce .sig-option-box { background: #00e5a00d; }
.signal-banner-pe .sig-option-box { background: #f871710d; }
.sig-section-label {
  font-size: 9px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 6px;
}
.sig-ts-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.sig-ts { font-family: var(--mono); font-weight: 600; font-size: 18px; color: var(--text); }
.sig-copy-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text-muted); border-radius: 5px;
  padding: 3px 9px; font-size: 11px; cursor: pointer;
  font-family: var(--mono); transition: color .15s, border-color .15s;
}
.sig-copy-btn:hover { color: var(--text); border-color: var(--border2); }
.sig-copy-btn.copied { color: var(--green); border-color: var(--green); }

/* Quick-copy rows: expiry and LTP inside the option box */
.sig-quickcopy-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
}
.sig-qc-label {
  font-size: 11px; color: var(--text-muted);
  min-width: 76px; flex-shrink: 0;
}
.sig-qc-val {
  font-family: var(--mono); font-size: 14px;
  color: var(--text); flex: 1;
}
.sig-option-meta { font-size: 11px; color: var(--text-muted); }
.sig-unavail { font-size: 12px; color: var(--amber); padding: 4px 0; }

/* Three price boxes */
.sig-prices {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: var(--border);
}
.sig-price-box {
  background: var(--surface);
  padding: 10px 14px;
}
.sig-price-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
.sig-price-val { font-family: var(--display); font-weight: 700; font-size: 16px; color: var(--text); }
.sig-price-val.unavail { font-size: 12px; color: var(--text-muted); font-family: var(--mono); font-weight: 400; }
.sig-price-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Conviction / Futures / Risk row */
.sig-meta-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border-top: 1px solid var(--border);
}
.sig-meta-item {
  background: var(--surface2);
  padding: 8px 14px;
}
.sig-meta-label { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 3px; }
.sig-meta-val { font-size: 12px; color: var(--text-dim); }

/* Conditions row */
.sig-conds {
  background: var(--surface);
  padding: 10px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 16px;
  font-size: 11px;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
}
.sig-cond-pass { color: var(--green); }
.sig-cond-fail { color: #f8717160; }

/* INSTRUMENT CARDS */
.instrument-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.card-name { font-family: var(--display); font-weight: 700; font-size: 16px; color: #fff; }
.card-price { font-size: 13px; color: var(--green); }
.card-meta { font-size: 10px; color: var(--text-muted); margin-bottom: 12px; letter-spacing: .03em; }
.conditions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cond-box { border-radius: 7px; padding: 10px 12px; }
.cond-ce { background: #00e5a00a; border: 1px solid #00e5a020; }
.cond-pe { background: #f871710a; border: 1px solid #f8717120; }
.cond-dir { font-size: 10px; font-weight: 600; letter-spacing: .1em; margin-bottom: 7px; }
.cond-ce .cond-dir { color: var(--green); }
.cond-pe .cond-dir { color: var(--red); }
.cond-row { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); padding: 2px 0; }
.check-pass { color: var(--green); }
.check-fail { color: #f8717160; }
.cond-status { font-size: 10px; margin-top: 7px; font-weight: 600; letter-spacing: .05em; }
.status-signal-ce { color: var(--green); }
.status-signal-pe { color: var(--red); }
.status-none { color: var(--text-muted); }

/* STOCK ROWS (compact, mobile-friendly) */
.stock-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  cursor: pointer;
}
.stock-row:hover { background: var(--surface2); }
.stock-row-left { display: flex; align-items: center; gap: 8px; min-width: 0; overflow: hidden; }
.stock-name { font-family: var(--display); font-weight: 700; font-size: 13px; color: #fff; white-space: nowrap; }
.stock-sector-chip {
  font-size: 8px; letter-spacing: .05em; text-transform: uppercase;
  color: var(--text-muted); border: 1px solid var(--border2);
  padding: 1px 5px; border-radius: 3px; white-space: nowrap;
}
.stock-row-mid { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.stock-price { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
.stock-dots-group { display: flex; align-items: center; gap: 4px; }
.stock-dots-label { font-size: 8px; color: var(--text-muted); margin-right: 2px; }
.stock-row-right { flex-shrink: 0; }
.stock-status-chip {
  font-size: 9px; font-weight: 700; letter-spacing: .05em;
  padding: 2px 7px; border-radius: 10px; white-space: nowrap;
}
.stock-status-signal-ce { background: #00e5a015; color: var(--green); }
.stock-status-signal-pe { background: #f8717115; color: var(--red); }
.stock-status-none { background: var(--surface2); color: var(--text-muted); }

/* HISTORY */
.history-section { margin-top: 20px; }
.section-title {
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 8px;
}
.history-table {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  max-height: 360px;
  overflow-y: auto;
}
.history-row {
  display: grid;
  grid-template-columns: 42px 72px 1fr 1fr 28px;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
}
.history-row:last-child { border-bottom: none; }
.history-row.row-ce-signal { border-left: 3px solid var(--green); }
.history-row.row-pe-signal { border-left: 3px solid var(--red); }
.history-row.row-ce-signal, .history-row.row-pe-signal { padding-left: 9px; }
.h-time { color: var(--text-muted); }
.h-inst { color: var(--text); font-weight: 600; }
.eq-chip {
  font-size: 8px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-muted); border: 1px solid var(--border);
  padding: 1px 4px; border-radius: 3px; margin-left: 4px;
  vertical-align: middle;
}
.h-dots { display: flex; gap: 3px; }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
}
.dot-pass { background: var(--green); }
.dot-fail { background: var(--border2); }
.h-sig { font-weight: 700; font-size: 9px; }
.sig-ce { color: var(--green); }
.sig-pe { color: var(--red); }
.sig-none { color: var(--border2); }

/* Clickable signal rows */
.history-row.row-ce-signal,
.history-row.row-pe-signal { cursor: pointer; }
.history-row.row-ce-signal:hover,
.history-row.row-pe-signal:hover { background: var(--surface); }

/* Bottom drawer */
.drawer-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
}
.drawer-overlay.open { display: block; }
.drawer-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-height: 82vh; overflow-y: auto;
  background: var(--bg);
  border-top: 2px solid var(--border2);
  border-radius: 14px 14px 0 0;
  z-index: 201;
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.drawer-panel.open { transform: translateY(0); }
.drawer-handle {
  display: flex; justify-content: center;
  padding: 10px 0 4px; position: relative;
}
.drawer-handle::before {
  content: ''; width: 36px; height: 4px;
  background: var(--border2); border-radius: 2px;
}
.drawer-close {
  position: absolute; top: 8px; right: 16px;
  background: none; border: none;
  color: var(--text-muted); font-size: 18px;
  cursor: pointer; line-height: 1;
}
.drawer-inner { padding: 0 16px 32px; }

/* EMPTY STATES */
.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-muted);
  font-size: 12px;
}

/* FOOTER */
.footer-credit {
  text-align: center;
  padding: 24px 16px 20px;
  font-size: 0.72rem;
  color: var(--text-muted);
  opacity: 0.45;
}
.footer-credit .heart { color: var(--green); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <span class="live-dot"></span>
    <span class="app-name">⬡ F&amp;O Signal Bot</span>
  </div>
  <div class="header-right">
    <span class="time-ago" id="time-ago">Loading…</span>
    <span class="token-pill pill-expired" id="token-pill">⚫ –</span>
  </div>
</div>

<!-- OFFLINE BANNER -->
<div class="offline-banner" id="offline-banner">Dashboard offline — retrying…</div>

<!-- CONTENT -->
<div class="content">

  <!-- SIGNAL BANNERS -->
  <div id="signal-area" style="display:none"></div>

  <!-- INSTRUMENT CARDS -->
  <div id="instrument-area">
    <div class="empty-state">Loading instruments…</div>
  </div>

  <!-- STOCK CARDS -->
  <div class="section-title" style="padding: 16px 16px 6px; margin-top: 8px;">
    NSE Stocks <span style="font-size:9px;color:var(--text-muted);font-weight:400;margin-left:6px;">ALERT ONLY · MONTHLY EXPIRY</span>
  </div>
  <div id="stock-area">
    <div class="empty-state">Loading stocks…</div>
  </div>

  <!-- HISTORY -->
  <div class="history-section">
    <div class="section-title">Today's Log</div>
    <div class="history-table" id="history-table">
      <div class="empty-state">No history yet</div>
    </div>
  </div>

</div>

<!-- BOTTOM DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer-panel" id="drawer-panel">
  <div class="drawer-handle">
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-inner" id="drawer-content"></div>
</div>

<script>
const CE_LABELS = ['Close ↑ prev', 'VWAP cross-up', 'RSI rising', '+DI > 25'];
const PE_LABELS = ['Close ↓ prev', 'VWAP cross-dn', 'RSI falling', '-DI > 25'];

let lastFetchTime = null;
let lastRunISO = null;
let activeSignalsMap = {};
let signalRows = [];
let stockRows = [];

async function fetchData() {
  const t = Date.now();
  const [idxResult, stkResult] = await Promise.allSettled([
    fetch(`./dashboard.json?t=${t}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
    fetch(`./stock-dashboard.json?t=${t}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
  ]);

  if (idxResult.status === 'fulfilled') {
    lastFetchTime = Date.now();
    document.getElementById('offline-banner').style.display = 'none';
    const stockData = stkResult.status === 'fulfilled' ? stkResult.value : null;
    if (stkResult.status === 'rejected') console.warn('stock-dashboard fetch failed:', stkResult.reason);
    render(idxResult.value, stockData);
  } else {
    document.getElementById('offline-banner').style.display = 'block';
    console.error('Index dashboard fetch failed:', idxResult.reason);
  }
}

function render(indexData, stockData) {
  // Merge activeSignalsMap: index signals + stock signals
  activeSignalsMap = {};
  for (const s of (indexData.active_signals || [])) {
    const key = `${s.instrument}:${(s.direction || '').toUpperCase()}`;
    activeSignalsMap[key] = s;
  }
  if (stockData) {
    for (const s of (stockData.active_signals || [])) {
      const key = `${s.instrument}:${(s.direction || '').toUpperCase()}`;
      activeSignalsMap[key] = s;
    }
  }
  updateHeader(indexData);
  renderSignalBanners(indexData.active_signals || []);  // index banners only
  renderInstruments(indexData.instruments || []);        // index cards only
  if (stockData) {
    renderStockRows(stockData.instruments || []);
  } else {
    document.getElementById('stock-area').innerHTML = '<div class="empty-state">Stock dashboard unavailable.</div>';
  }

  // Merge and sort histories; tag source for EQ chip
  const idxHist = (indexData.history || []).map(r => ({ ...r, source: 'INDEX' }));
  const stkHist = stockData ? (stockData.history || []).map(r => ({ ...r, source: 'STOCK' })) : [];
  const merged = [...idxHist, ...stkHist]
    .sort((a, b) => (b.time || '').localeCompare(a.time || ''))
    .slice(0, 500);
  renderHistory(merged);
}

function updateHeader(data) {
  lastRunISO = data.last_run;
  updateTimeAgo();

  const pill = document.getElementById('token-pill');
  if (data.token_valid) {
    pill.textContent = '🟢 Valid';
    pill.className = 'token-pill pill-valid';
  } else {
    pill.textContent = '🔴 Refresh';
    pill.className = 'token-pill pill-expired';
  }
}

function updateTimeAgo() {
  const el = document.getElementById('time-ago');
  if (!lastRunISO) { el.textContent = 'No data'; return; }
  try {
    const then = new Date(lastRunISO);
    const diffMs = Date.now() - then.getTime();
    const diffMin = Math.floor(diffMs / 60000);
    const timeStr = then.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata' });
    el.textContent = diffMin < 1 ? `${timeStr} · just now` : `${timeStr} · ${diffMin}m ago`;
  } catch { el.textContent = 'Unknown'; }
}

/* ── Signal banner helpers ──────────────────────────────────── */

function fp(v) {
  return (v !== null && v !== undefined) ? `₹${Number(v).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2})}` : 'unavailable';
}

function fi(v) {
  return (v !== null && v !== undefined) ? Number(v).toLocaleString('en-IN', {minimumFractionDigits:1, maximumFractionDigits:1}) : '—';
}

function fmtExpiry(isoDate) {
  if (!isoDate) return '—';
  try {
    const d = new Date(isoDate + 'T00:00:00');
    const day = d.getUTCDay(); // 2 = Tuesday
    const dayStr = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', timeZone: 'UTC' });
    return dayStr + (day === 2 ? ' weekly' : ' monthly');
  } catch { return isoDate; }
}

function condItem(pass, label) {
  return `<span class="${pass ? 'sig-cond-pass' : 'sig-cond-fail'}">${pass ? '✅' : '❌'} ${escHtml(label)}</span>`;
}

function copyTs(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {});
}

function renderSignalBanners(signals) {
  const area = document.getElementById('signal-area');
  if (!signals || signals.length === 0) {
    area.style.display = 'none';
    area.innerHTML = '';
    return;
  }
  area.style.display = 'block';
  area.innerHTML = signals.map(s => buildSignalBanner(s)).join('');
}

function buildSignalBanner(s) {
  const dir    = (s.direction || '').toUpperCase();
  const isCE   = dir === 'CE';
  const cls    = isCE ? 'signal-banner-ce' : 'signal-banner-pe';
  const emoji  = isCE ? '🟢' : '🔴';
  const arrow  = isCE ? '↑' : '↓';

  const ts     = s.tradingsymbol;
  const strike = s.strike;
  const hasOption = ts && s.atm_ltp !== null && s.atm_ltp !== undefined;

  // Header
  const header = `
    <div class="sig-header">
      <span class="sig-title">${emoji} ${dir} SIGNAL — ${escHtml(s.instrument || '')}</span>
      <span class="sig-candle-time">${escHtml(s.candle_time || '')}</span>
    </div>`;

  // Buy this option
  let optBox;
  if (!hasOption) {
    optBox = `
      <div class="sig-option-box">
        <div class="sig-section-label">BUY THIS OPTION</div>
        <div class="sig-unavail">Option data unavailable — check morning-login ran correctly.</div>
      </div>`;
  } else {
    const copyId = `copy_${s.instrument}_${dir}`;
    const ltpNum = s.atm_ltp != null ? Number(s.atm_ltp).toFixed(2) : '';
    const expiryFmt = fmtExpiry(s.expiry);
    optBox = `
      <div class="sig-option-box">
        <div class="sig-section-label">BUY THIS OPTION</div>
        <div class="sig-ts-row">
          <span class="sig-ts">${escHtml(ts)}</span>
          <button class="sig-copy-btn" onclick="copyTs('${escHtml(ts)}', this)">copy</button>
        </div>
        <div class="sig-quickcopy-row">
          <span class="sig-qc-label">Expiry</span>
          <span class="sig-qc-val">${escHtml(expiryFmt)}</span>
          <button class="sig-copy-btn" onclick="copyTs('${escHtml(expiryFmt)}', this)">copy</button>
        </div>
        <div class="sig-quickcopy-row">
          <span class="sig-qc-label">Buy at (LTP)</span>
          <span class="sig-qc-val">${ltpNum || '—'}</span>
          <button class="sig-copy-btn" onclick="copyTs('${ltpNum}', this)">copy</button>
        </div>
        <div class="sig-option-meta">
          ${strike ? Number(strike).toLocaleString('en-IN') : '—'} ${dir}
          &nbsp;·&nbsp;${escHtml(fmtExpiry(s.expiry))} expiry
          &nbsp;·&nbsp;LTP fetched @ ${escHtml(s.fetch_time || '—')}
        </div>
      </div>`;
  }

  // Price boxes
  const buyVal    = s.atm_ltp    !== null && s.atm_ltp    !== undefined;
  const tgtVal    = s.opt_target !== null && s.opt_target !== undefined;
  const slVal     = s.opt_sl     !== null && s.opt_sl     !== undefined;
  const prices = `
    <div class="sig-prices">
      <div class="sig-price-box">
        <div class="sig-price-label">Buy at</div>
        <div class="sig-price-val${buyVal ? '' : ' unavail'}">${fp(s.atm_ltp)}</div>
        <div class="sig-price-sub">live LTP @ ${escHtml(s.fetch_time || '—')}</div>
      </div>
      <div class="sig-price-box">
        <div class="sig-price-label">Target</div>
        <div class="sig-price-val${tgtVal ? '' : ' unavail'}">${fp(s.opt_target)}</div>
        <div class="sig-price-sub">if ${escHtml(s.instrument || '')} spot → ${fi(s.spot_tgt)}</div>
      </div>
      <div class="sig-price-box">
        <div class="sig-price-label">Stop Loss</div>
        <div class="sig-price-val${slVal ? '' : ' unavail'}">${fp(s.opt_sl)}</div>
        <div class="sig-price-sub">if ${escHtml(s.instrument || '')} spot → ${fi(s.spot_sl)}</div>
      </div>
    </div>`;

  // Meta row
  const isStock   = s.asset_class === 'STOCK';
  const convLabel = s.conviction ? `${escHtml(s.conviction)}  ·  1:${s.rr || 3.0}` : '—';
  const futLabel  = isStock ? 'Spot' : 'Futures / Spot';
  const futStr    = s.futures_price
    ? (fi(s.futures_price) + (!isStock && s.fut_spot_spread && Math.abs(s.fut_spot_spread) > 5
        ? ` / ${fi(s.spot_ltp)}` : ''))
    : '—';
  const riskStr   = s.raw_risk !== null && s.raw_risk !== undefined
    ? `${Number(s.raw_risk).toFixed(1)} pts` : '—';
  const meta = `
    <div class="sig-meta-row">
      <div class="sig-meta-item">
        <div class="sig-meta-label">Conviction</div>
        <div class="sig-meta-val">${convLabel}</div>
      </div>
      <div class="sig-meta-item">
        <div class="sig-meta-label">${futLabel}</div>
        <div class="sig-meta-val">${futStr}</div>
      </div>
      <div class="sig-meta-item">
        <div class="sig-meta-label">Risk</div>
        <div class="sig-meta-val">${riskStr}</div>
      </div>
    </div>`;

  // Conditions
  const c1lbl = isCE ? `Candle ${arrow} prev close` : `Candle ${arrow} prev close`;
  const c2lbl = isCE ? 'VWAP cross-up ≤30min' : 'VWAP cross-dn ≤30min';
  const c3lbl = isCE ? 'RSI rising (3 candles)' : 'RSI falling (3 candles)';
  const c4lbl = isCE ? '+DI > 25, dominant ↑' : '−DI > 25, dominant ↑';
  const conds = `
    <div class="sig-conds">
      ${condItem(s.c1, c1lbl)}
      ${condItem(s.c2, c2lbl)}
      ${condItem(s.c3, c3lbl)}
      ${condItem(s.c4, c4lbl)}
    </div>`;

  return `<div class="signal-banner ${cls}">${header}${optBox}${prices}${meta}${conds}</div>`;
}

/* ── Instrument cards ───────────────────────────────────────── */

function renderInstruments(instruments, targetId = 'instrument-area') {
  const area = document.getElementById(targetId);
  if (!instruments || instruments.length === 0) {
    area.innerHTML = '<div class="empty-state">Waiting for first run…</div>';
    return;
  }
  area.innerHTML = instruments.map(inst => buildInstrumentCard(inst)).join('');
}

function buildInstrumentCard(inst) {
  const price = inst.futures_price;
  const priceStr = price ? Number(price).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '–';
  const vwap = inst.vwap ? Number(inst.vwap).toLocaleString('en-IN', { maximumFractionDigits: 0 }) : '–';
  const rsi = inst.rsi ? Number(inst.rsi).toFixed(1) : '–';
  const pdi = inst.pdi ? Number(inst.pdi).toFixed(1) : '–';
  const ndi = inst.ndi ? Number(inst.ndi).toFixed(1) : '–';

  const priceArrow = inst.ce?.c1 ? ' ↑' : (inst.pe?.c1 ? ' ↓' : '');
  const priceColor = inst.ce?.signal ? 'var(--green)' : (inst.pe?.signal ? 'var(--red)' : 'var(--green)');

  const ceConds = buildCondRows(inst.ce, CE_LABELS);
  const peConds = buildCondRows(inst.pe, PE_LABELS);
  const ceStatus = inst.ce?.signal
    ? '<div class="cond-status status-signal-ce">● SIGNAL</div>'
    : '<div class="cond-status status-none">── no signal</div>';
  const peStatus = inst.pe?.signal
    ? '<div class="cond-status status-signal-pe">● SIGNAL</div>'
    : '<div class="cond-status status-none">── no signal</div>';

  return `
    <div class="instrument-card">
      <div class="card-head">
        <span class="card-name">${escHtml(inst.name || '')}</span>
        <span class="card-price" style="color:${priceColor}">${priceStr}${priceArrow}</span>
      </div>
      <div class="card-meta">VWAP ${vwap} · RSI ${rsi} · +DI ${pdi} / -DI ${ndi}</div>
      <div class="conditions-grid">
        <div class="cond-box cond-ce">
          <div class="cond-dir">🟢 CE</div>
          ${ceConds}
          ${ceStatus}
        </div>
        <div class="cond-box cond-pe">
          <div class="cond-dir">🔴 PE</div>
          ${peConds}
          ${peStatus}
        </div>
      </div>
    </div>`;
}

function buildCondRows(side, labels) {
  if (!side) return labels.map(l => condRow(false, l)).join('');
  const keys = ['c1', 'c2', 'c3', 'c4'];
  return keys.map((k, i) => condRow(!!side[k], labels[i])).join('');
}

function condRow(pass, label) {
  const icon = pass
    ? '<span class="check-pass">✓</span>'
    : '<span class="check-fail">✗</span>';
  return `<div class="cond-row">${icon}<span>${escHtml(label)}</span></div>`;
}

/* ── Stock rows (compact) ───────────────────────────────────── */

function renderStockRows(instruments) {
  const area = document.getElementById('stock-area');
  if (!instruments || instruments.length === 0) {
    area.innerHTML = '<div class="empty-state">Loading stocks…</div>';
    return;
  }
  stockRows = instruments;
  area.innerHTML = instruments.map((inst, idx) => buildStockRow(inst, idx)).join('');
}

function buildStockRow(inst, idx) {
  const price = inst.futures_price;
  const priceStr = price
    ? Number(price).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    : '–';
  const statusCls = inst.ce?.signal ? 'stock-status-signal-ce'
    : (inst.pe?.signal ? 'stock-status-signal-pe' : 'stock-status-none');
  const statusTxt = inst.ce?.signal ? 'CE SIGNAL' : (inst.pe?.signal ? 'PE SIGNAL' : '—');
  const ceDots = buildDots([inst.ce?.c1, inst.ce?.c2, inst.ce?.c3, inst.ce?.c4]);
  const peDots = buildDots([inst.pe?.c1, inst.pe?.c2, inst.pe?.c3, inst.pe?.c4]);

  return `
    <div class="stock-row" onclick="openStockDrawer(${idx})" role="button" tabindex="0">
      <div class="stock-row-left">
        <span class="stock-name">${escHtml(inst.name || '')}</span>
        <span class="stock-sector-chip">${escHtml(inst.sector || '')}</span>
      </div>
      <div class="stock-row-mid">
        <span class="stock-price">${priceStr}</span>
        <div class="stock-dots-group">
          <span class="stock-dots-label">CE</span>${ceDots}
          <span class="stock-dots-label">PE</span>${peDots}
        </div>
      </div>
      <div class="stock-row-right">
        <span class="stock-status-chip ${statusCls}">${statusTxt}</span>
      </div>
    </div>`;
}

function openStockDrawer(idx) {
  const inst = stockRows[idx];
  if (!inst) return;
  document.getElementById('drawer-content').innerHTML = buildInstrumentCard(inst);
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

/* ── History ────────────────────────────────────────────────── */

function renderHistory(history) {
  signalRows = [];
  const table = document.getElementById('history-table');
  if (!history || history.length === 0) {
    table.innerHTML = '<div class="empty-state">No history yet today</div>';
    return;
  }
  table.innerHTML = history.map(row => {
    const isSignal = row.ce_signal || row.pe_signal;
    const rowCls = row.ce_signal ? 'row-ce-signal' : (row.pe_signal ? 'row-pe-signal' : '');
    let drawerAttr = '';
    if (isSignal) {
      const idx = signalRows.length;
      signalRows.push(row);
      drawerAttr = `onclick="openDrawer(${idx})" role="button" tabindex="0"`;
    }
    const ceDots = buildDots(row.ce_conditions || []);
    const peDots = buildDots(row.pe_conditions || []);
    const eqChip = row.source === 'STOCK' ? '<span class="eq-chip">EQ</span>' : '';
    let sigSpan;
    if (row.ce_signal) sigSpan = '<span class="h-sig sig-ce">CE✓</span>';
    else if (row.pe_signal) sigSpan = '<span class="h-sig sig-pe">PE✓</span>';
    else sigSpan = '<span class="h-sig sig-none">──</span>';
    return `
      <div class="history-row ${rowCls}" ${drawerAttr}>
        <span class="h-time">${escHtml(row.time || '')}</span>
        <span class="h-inst">${escHtml(row.instrument || '')}${eqChip}</span>
        <span class="h-dots">${ceDots}</span>
        <span class="h-dots">${peDots}</span>
        ${sigSpan}
      </div>`;
  }).join('');
}

/* ── Drawer ─────────────────────────────────────────────────── */

function openDrawer(idx) {
  const row = signalRows[idx];
  if (!row) return;
  const dir = row.ce_signal ? 'CE' : 'PE';
  const key = `${row.instrument}:${dir}`;
  const signal = activeSignalsMap[key];
  document.getElementById('drawer-content').innerHTML =
    signal ? buildSignalBanner(signal) : buildHistoryDetail(row, dir);
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer-panel').classList.remove('open');
  document.body.style.overflow = '';
}

function buildHistoryDetail(row, dir) {
  const isCE   = dir === 'CE';
  const cls    = isCE ? 'signal-banner-ce' : 'signal-banner-pe';
  const emoji  = isCE ? '🟢' : '🔴';
  const arrow  = isCE ? '↑' : '↓';
  const conds  = isCE ? (row.ce_conditions || []) : (row.pe_conditions || []);
  const labels = isCE ? CE_LABELS : PE_LABELS;
  const meta = `
    <div class="sig-meta-row">
      <div class="sig-meta-item">
        <div class="sig-meta-label">Futures Price</div>
        <div class="sig-meta-val">${fi(row.price)}</div>
      </div>
      <div class="sig-meta-item">
        <div class="sig-meta-label">RSI(14)</div>
        <div class="sig-meta-val">${row.rsi !== null && row.rsi !== undefined ? Number(row.rsi).toFixed(1) : '—'}</div>
      </div>
      <div class="sig-meta-item">
        <div class="sig-meta-label">+DI / −DI</div>
        <div class="sig-meta-val">${fi(row.pdi)} / ${fi(row.ndi)}</div>
      </div>
    </div>`;
  const condsHtml = `
    <div class="sig-conds">
      ${labels.map((lbl, i) => condItem(!!conds[i], lbl)).join('')}
    </div>`;
  return `<div class="signal-banner ${cls}" style="animation:none;margin-bottom:0">
    <div class="sig-header">
      <span class="sig-title">${emoji} ${dir} SIGNAL — ${escHtml(row.instrument || '')}</span>
      <span class="sig-candle-time">${escHtml(row.time || '')} · cleared</span>
    </div>
    ${meta}${condsHtml}
  </div>`;
}

function buildDots(conds) {
  return (conds || [false, false, false, false]).map(v =>
    `<span class="dot ${v ? 'dot-pass' : 'dot-fail'}"></span>`
  ).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Poll every 5 minutes
setInterval(fetchData, 5 * 60 * 1000);
// Update "X min ago" counter every 30 seconds
setInterval(updateTimeAgo, 30 * 1000);
// Load immediately
fetchData();
</script>
