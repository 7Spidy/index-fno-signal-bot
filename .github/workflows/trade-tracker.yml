name: Trade Position Tracker

on:
  workflow_dispatch: {}            # cron-job.org is the sole external trigger

permissions:
  contents: read                   # read-only — no git push needed

concurrency:
  group: trade-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Record job start
        run: echo "TRACKER_JOB_START_EPOCH=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run position tracker
        run: python -m src.position_tracker
        env:
          KITE_API_KEY:                        ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:              ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN:            ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DISCORD_TRADE_TRACKER_WEBHOOK_URL:   ${{ secrets.DISCORD_TRADE_TRACKER_WEBHOOK_URL }}
          TRACKER_SUBLOOPS:                    ${{ vars.TRACKER_SUBLOOPS || '4' }}
          TRACKER_SUBLOOP_SECS:                ${{ vars.TRACKER_SUBLOOP_SECS || '15' }}
          TRACKER_LOOP_BUDGET_SECS:            ${{ vars.TRACKER_LOOP_BUDGET_SECS || '55' }}
