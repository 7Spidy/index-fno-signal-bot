name: Morning Login

on:
  workflow_dispatch: {}

permissions:
  contents: write              # needed for git push to docs/

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Kite TOTP login → Redis token
        run: python -m src.auth
        env:
          KITE_API_KEY:        ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:     ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:        ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:       ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET:    ${{ secrets.KITE_TOTP_SECRET }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Backfill India VIX history (idempotent)
        run: python -m src.condor_engine --backfill-vix-history
        continue-on-error: true
        env:
          KITE_API_KEY:             ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Cache instrument tokens
        run: python -m src.kite_client --cache-instruments
        env:
          KITE_API_KEY:             ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Cache option tokens
        run: python -m src.kite_client --cache-option-tokens
        env:
          KITE_API_KEY:             ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: PVWAP pre-market bias (NIFTY)
        run: python -m src.kite_client --pvwap-premarket
        continue-on-error: true
        env:
          KITE_API_KEY:             ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DISCORD_WEBHOOK_URL:      ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Reset dashboard for new day
        run: python -m src.dashboard_writer --reset-day
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Cache stock equity tokens
        run: python -m src.stock_kite_client --cache-equity-tokens
        env:
          KITE_API_KEY:             ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Cache stock option tokens (monthly)
        run: python -m src.stock_kite_client --cache-stock-options
        env:
          KITE_API_KEY:             ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Cache stock daily ATR
        run: python -m src.stock_kite_client --cache-daily-atr
        env:
          KITE_API_KEY:             ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Cache stock event exclusions
        run: python -m src.stock_events --cache-event-exclusions
        continue-on-error: true
        env:
          UPSTASH_REDIS_REST_URL:    ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN:  ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          MARKETAUX_API_TOKEN:       ${{ secrets.MARKETAUX_API_TOKEN }}
          DISCORD_STOCK_WEBHOOK_URL: ${{ secrets.DISCORD_STOCK_WEBHOOK_URL }}

      - name: Cache sector performance
        run: python -m src.sector_performance --cache-sector-performance
        continue-on-error: true
        env:
          KITE_API_KEY:              ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:    ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN:  ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
