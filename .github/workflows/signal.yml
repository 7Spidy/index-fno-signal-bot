name: Signal Evaluation

on:
  workflow_dispatch: {}            # cron-job.org is the sole trigger now

permissions:
  contents: write                  # needed for git push to docs/dashboard.json

concurrency:
  group: gh-pages-commit
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"             # saves ~40-60s/run vs cold install

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Evaluate signals
        run: python -m src.main
        env:
          KITE_API_KEY:             ${{ secrets.KITE_API_KEY }}
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DISCORD_WEBHOOK_URL:      ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:             ${{ secrets.NOTION_DB_ID }}
